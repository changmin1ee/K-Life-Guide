spring:
  application:
    name: backend

  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/klifeguide?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  data:
    mongodb:
      uri: mongodb://localhost:27017/klifeguide
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-env-it-must-be-long-enough-for-hmac-sha256}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 1209600000

gemini:
  base-url: https://generativelanguage.googleapis.com
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash

mission:
  verification:
    auto-approve-confidence-threshold: 80
    auto-reject-confidence-threshold: 40

logging:
  level:
    org.hibernate.SQL: debug
