version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# Production 환경 (AWS EC2)
# - MySQL  → AWS RDS (외부 관리형 서비스, compose에서 제외)
# - MongoDB → EC2 내 컨테이너 (DocumentDB 대체)
# - Redis  → EC2 내 컨테이너 (ElastiCache 대체)
# - App    → Spring Boot 컨테이너
# - Nginx  → 리버스 프록시 (80 → 8080)
# ──────────────────────────────────────────────────────────────────────────────

services:
  mongodb:
    image: mongo:7.0
    container_name: klife-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - klife-net

  redis:
    image: redis:7.2-alpine
    container_name: klife-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - klife-net

  app:
    image: ${ECR_IMAGE}
    container_name: klife-app-prod
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      RDS_ENDPOINT: ${RDS_ENDPOINT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      RDS_USERNAME: ${RDS_USERNAME}
      RDS_PASSWORD: ${RDS_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    depends_on:
      - mongodb
      - redis
    networks:
      - klife-net

  nginx:
    image: nginx:alpine
    container_name: klife-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - klife-net

networks:
  klife-net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
