spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT}:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&characterEncoding=utf8&useSSL=true&requireSSL=true
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
  data:
    mongodb:
      uri: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:27017/${MONGO_DATABASE}?authSource=admin
      database: ${MONGO_DATABASE}
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 86400000
  refresh-expiration: 604800000

google:
  client-id: ${GOOGLE_CLIENT_ID}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    stack:
      auto: false

logging:
  level:
    root: WARN
    com.klife: INFO
